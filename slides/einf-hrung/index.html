<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Einführung</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/reveal.css">
  <!-- Reveal.js theme -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/theme/white.css">
  <!-- Code syntax highlighting -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github-dark.min.css">
</head>
<body class="">
  <div class="reveal" data-theme="white" data-code-theme="github-dark">
    <div class="slides">
<section style="top: 122.5px; display: block;" class="editing-mode">
        <h1>Einführung</h1>
      <div class="sl-block" data-block-type="code" style="left: 242px; top: 255px; width: 500px; height: 200px; z-index: 0;" data-column-label="Column 1"><div class="sl-block-content"><pre data-line-numbers=""><code class="language-java">private void test() {
}</code></pre></div></div></section>
<section style="top: 350px; display: block;" hidden="" aria-hidden="true" class="editing-mode">
        <h2>Slide 2</h2>
        <p>Add your content here...</p>
      </section>
<section style="top: 350px; display: block;" hidden="" aria-hidden="true" class="editing-mode">
        <h2>Code Example</h2>
        <pre><code class="language-javascript">// Your code here
function example() {
  return "Hello, World!";
}</code></pre>
      </section>
<section style="top: 350px; display: none;" hidden="" aria-hidden="true" class="editing-mode">
        <h2>Questions?</h2>
      </section>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/reveal.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/plugin/highlight/highlight.js"></script>
  <script>
    Reveal.initialize({
      hash: true,
      controls: true,
      progress: true,
      center: true,
      transition: 'slide',
      plugins: [RevealHighlight]
    });
  </script>
</body>
</html>
